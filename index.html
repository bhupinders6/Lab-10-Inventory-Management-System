<!DOCTYPE html>
<html>
    <head>
        <title> Store Inventory </title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1>My Store</h1>

        <button onclick="showInventory()">Show Inventory</button>
        <button onclick="applyDiscount()">Apply 15% Discount</button>

        <h2>Total:</h2>
        <p id="totalValue">0</p>

        <h2>Find Product</h2>
        <input type="text" id="searchName" placeholder="Enter Product name">
        <button onclick="findProduct()">Search</button>

        <p id="result"></p>

        <h2>Inventory List</h2>
        <div id="inventoryList"></div>

        <script src="script.js"></script>

    </body>
</html>
